spring:
  application:
    name: fscbridge-web

  # H2 in-memory database for development
  # Phase 2 we switch this to PostgreSQL
  datasource:
    url: jdbc:h2:mem:fscbridgedb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password: ""

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    database-platform: org.hibernate.dialect.H2Dialect

  # H2 web console so you can see the database in browser
  h2:
    console:
      enabled: true
      path: /h2-console

# Salesforce connection settings
# Fill these with your actual Salesforce credentials
# We will encrypt these with Jasypt in Phase 2
salesforce:
  loginUrl: https://test.salesforce.com
  clientId: YOUR_CLIENT_ID_HERE
  clientSecret: YOUR_CLIENT_SECRET_HERE
  username: YOUR_SF_USERNAME_HERE
  password: YOUR_SF_PASSWORD_AND_TOKEN_HERE
  apiVersion: v59.0

server:
  port: 8080

# Expose actuator endpoints
management:
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    health:
      show-details: always

# Logging
logging:
  level:
    fscbridge_web: DEBUG
    fscbridge_audit: DEBUG
    fsbridge_connector: DEBUG
    fsbridge_mapper: DEBUG
    org.springframework: INFO
  pattern:
    console: "%d{HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"